name: Live Smoke (ingest)

# Phase B coverage: boots the docker-compose stack with the ingest
# override (Azurite + Service Bus emulator + IngestWorker) on the
# CI runner and round-trips an upload through the full pipeline.
# Catches regressions that the other smokes can't:
#   - api -> Azurite blob write (BlobUploadService)
#   - api -> SB emulator enqueue (ServiceBusIngestJobPublisher)
#   - sb -> worker dequeue (IngestServiceBusHostedService)
#   - worker -> Azurite blob read (AzureBlobContentOpener)
#   - worker -> Markdown skill plugin
#   - worker -> Postgres source_chunks write
#
# Each of those is independently mocked or stubbed in unit tests; this
# job is the only one that proves they wire together against real
# emulator containers.
#
# Long timeout because the Service Bus emulator stack (SQL Server Edge
# + SB emulator container) takes ~30-60s to come up on a cold CI runner.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  live-smoke-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-pull base images
        # SB emulator + SQL Server Edge are large + slow to download.
        # Parallel-pull while the api/worker images build saves wall
        # time. Azurite is small but pull anyway for consistency.
        run: |
          docker pull pgvector/pgvector:pg16 &
          docker pull liquibase/liquibase:4.29 &
          docker pull mcr.microsoft.com/azure-storage/azurite:latest &
          docker pull mcr.microsoft.com/azure-sql-edge:latest &
          docker pull mcr.microsoft.com/azure-messaging/servicebus-emulator:latest &
          wait

      - name: Build + start compose with ingest profile
        # Don't start portal -- ingest smoke doesn't touch the Blazor UI.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml \
            up -d --build postgres migrations api azurite sb-emulator-db sb-emulator ingest-worker
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml ps -a

      - name: Run ingest smoke
        run: bash scripts/live-smoke-ingest.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in postgres migrations api azurite sb-emulator-db sb-emulator ingest-worker; do
            echo "##[group]ailib-${svc} logs"
            docker compose -f docker-compose.yml -f docker-compose.ingest.yml logs "${svc}" 2>&1 || true
            echo "##[endgroup]"
          done

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml down -v
