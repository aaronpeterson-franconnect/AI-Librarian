name: Live Smoke (ingest)

# Phase B v2: boots the docker-compose stack with the ingest override
# (Azurite + Service Bus emulator + IngestWorker) on the CI runner and
# round-trips an upload through the API. Asserts the upload path is
# wired:
#   - api -> Azurite blob write (BlobUploadService)
#   - api -> Postgres source row INSERT
#   - api -> Service Bus emulator send (the queue is what gates
#     /api/portal/sources/upload returning 200 instead of 503)
#   - api -> audit-events route audit row
#
# Worker-side dequeue + chunk write is NOT asserted (Phase B v3): the
# SB emulator + Azure.Messaging.ServiceBus 7.18.3 has a send-succeeds-
# but-receive-returns-null behavior that's tracked separately. The
# api-side gate this workflow covers is what was actually breaking in
# the original Phase B v1 attempts (upload returning 502 because the
# Azure.Storage.Blobs SDK rejected the documented Azurite connection
# string -- fixed in this PR via UseDevelopmentStorage=true).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  live-smoke-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-pull base images
        # SB emulator + SQL Server Edge are large + slow to download.
        # Parallel-pull saves wall time on the cold runner.
        run: |
          docker pull pgvector/pgvector:pg16 &
          docker pull liquibase/liquibase:4.29 &
          docker pull mcr.microsoft.com/azure-storage/azurite:latest &
          docker pull mcr.microsoft.com/azure-sql-edge:latest &
          docker pull mcr.microsoft.com/azure-messaging/servicebus-emulator:latest &
          wait

      - name: Build + start compose with ingest profile
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml \
            up -d --build postgres migrations api azurite sb-emulator-db sb-emulator ingest-worker
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml ps -a

      - name: Run ingest smoke
        run: bash scripts/live-smoke-ingest.sh

      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in postgres migrations api azurite sb-emulator-db sb-emulator ingest-worker; do
            echo "##[group]ailib-${svc} logs"
            docker compose -f docker-compose.yml -f docker-compose.ingest.yml logs "${svc}" 2>&1 || true
            echo "##[endgroup]"
          done

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ingest.yml down -v
