name: Release Images

# Builds and publishes the three container images (API, IngestWorker,
# Portal) to GitHub Container Registry (GHCR) on:
#   - push to main         -> tag: main + main-<sha>   (latest dev)
#   - push of v*.*.* tag   -> tag: <version> + latest  (releases)
#
# GHCR is the default because GITHUB_TOKEN works zero-config. Operators
# who want images in Azure Container Registry too can opt in by setting
# the ACR_LOGIN_SERVER + ACR_USERNAME + ACR_PASSWORD repository secrets;
# the workflow detects them and pushes to ACR alongside GHCR.
#
# Build matrix runs the three workloads in parallel; each uses the
# repo-root build context (Dockerfiles already do that).

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # GHCR push

jobs:
  build-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - workload: api
            image: ailib-api
            dockerfile: src/AiLibrarian.Api/Dockerfile
          - workload: ingest-worker
            image: ailib-ingest
            dockerfile: src/AiLibrarian.IngestWorker/Dockerfile
          - workload: portal
            image: ailib-portal
            dockerfile: src/AiLibrarian.Portal/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Detect whether ACR secrets are configured. github.event.* contexts
      # are evaluated at expression time; secrets are not directly testable
      # in if-conditions, so we materialize the existence as a step output.
      - name: Detect ACR opt-in
        id: acr_check
        run: |
          if [ -n "${{ secrets.ACR_LOGIN_SERVER }}" ]; then
            echo "enabled=true"  >> "$GITHUB_OUTPUT"
            echo "ACR push enabled: ${{ secrets.ACR_LOGIN_SERVER }}"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ACR push skipped (set ACR_LOGIN_SERVER + ACR_USERNAME + ACR_PASSWORD to enable)."
          fi

      - name: Log in to ACR
        if: steps.acr_check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # docker/metadata-action computes the right tags for branch / tag
      # / pr triggers. We restrict to two tag flavors:
      #   - <branch>            on branch push
      #   - <branch>-<sha7>     always, so the digest is addressable
      #   - <semver>            on v*.*.* tag push
      #   - latest              on v*.*.* tag push
      - name: Compute image metadata (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Compute image metadata (ACR)
        id: meta_acr
        if: steps.acr_check.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push (GHCR only)
        if: steps.acr_check.outputs.enabled != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.workload }}
          cache-to: type=gha,scope=${{ matrix.workload }},mode=max

      - name: Build + push (GHCR + ACR)
        if: steps.acr_check.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta_ghcr.outputs.tags }}
            ${{ steps.meta_acr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.workload }}
          cache-to: type=gha,scope=${{ matrix.workload }},mode=max

      - name: Summary
        run: |
          {
            echo "## ${{ matrix.image }}"
            echo ""
            echo "**GHCR tags:**"
            echo '```'
            echo "${{ steps.meta_ghcr.outputs.tags }}"
            echo '```'
            if [ "${{ steps.acr_check.outputs.enabled }}" = "true" ]; then
              echo ""
              echo "**ACR tags:**"
              echo '```'
              echo "${{ steps.meta_acr.outputs.tags }}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
