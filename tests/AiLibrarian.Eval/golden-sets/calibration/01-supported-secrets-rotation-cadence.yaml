id: supported-secrets-rotation-cadence
claim_text: "Staging Postgres credentials rotate every 90 days via the credential-rotation worker."
cited_chunks:
  - chunk_id: c0010001-1111-1111-1111-aaaaaaaaaaaa
    text: |
      ## Credential rotation cadence

      The credential-rotation worker enforces a 90-day maximum age on
      every secret in the staging environment, including the Postgres
      admin user. Older secrets are flagged and rotated automatically
      on the next sweep window. Production has a separate, tighter
      cadence (see prod runbook).
