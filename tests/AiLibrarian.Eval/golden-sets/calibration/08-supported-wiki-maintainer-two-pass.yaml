id: supported-wiki-maintainer-two-pass
claim_text: "The Wiki Maintainer uses a two-pass pipeline: Pass 1 LLM synthesis with inline [chunk:GUID] tokens, Pass 2 deterministic claim+citation extraction."
cited_chunks:
