      Pass 2: Pass2CitationExtractor walks the prose deterministically,
      splitting on sentence terminators and extracting the [chunk:GUID]
      tokens into Claim + Citation records. No second LLM call.

      Pass 2 output feeds ICitationValidator, then IWikiRevisionWriter.
